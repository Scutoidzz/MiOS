<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--settings-bg, #f4f4f7);
      color: var(--settings-text, #1e1e1e);
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .settings {
      display: grid;
      gap: 10px;
    }

    .card {
      background: var(--settings-card-bg, #fff);
      border: 1px solid var(--settings-border, #ddd);
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      gap: 10px;
    }

    button {
      border: 1px solid var(--settings-border, #bbb);
      border-radius: 6px;
      background: var(--settings-btn-bg, #fafafa);
      padding: 6px 10px;
      cursor: pointer;
    }

    .muted {
      color: var(--settings-muted, #666);
      font-size: 12px;
      margin: 4px 0 0;
    }

    select {
      border: 1px solid var(--settings-border, #bbb);
      border-radius: 6px;
      background: var(--settings-btn-bg, #fafafa);
      color: inherit;
      padding: 4px 8px;
    }

  </style>
</head>
<body>
  <main class="settings">
    <section class="card">
      <h2>Appearance</h2>
      <div class="row">
        <label for="theme-select">Theme</label>
        <select id="theme-select">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>
      <p class="muted">Changes apply instantly to the desktop window colors.</p>
    </section>

    <section class="card">
      <h2>Sound</h2>
      <div class="row">
        <span>Boot Music</span>
        <button id="toggle-music" type="button">Pause</button>
      </div>
      <p class="muted" id="music-status">Background music is currently playing.</p>
    </section>

    <section class="card">
      <h2>About MiOS</h2>
      <p class="muted">MiOS is a browser-based desktop experiment with draggable windows and mini apps.</p>
    </section>
  </main>

  <script>
    (function () {
      var root = window.parent && window.parent.document ? window.parent.document.documentElement : document.documentElement;
      var themeSelect = document.getElementById('theme-select');
      var toggleMusic = document.getElementById('toggle-music');
      var musicStatus = document.getElementById('music-status');

      function setSettingsTheme(theme) {
        var isDark = theme === 'dark';
        document.documentElement.style.setProperty('--settings-bg', isDark ? '#17181b' : '#f4f4f7');
        document.documentElement.style.setProperty('--settings-text', isDark ? '#e5e7eb' : '#1e1e1e');
        document.documentElement.style.setProperty('--settings-card-bg', isDark ? '#202228' : '#ffffff');
        document.documentElement.style.setProperty('--settings-border', isDark ? '#3d4049' : '#dddddd');
        document.documentElement.style.setProperty('--settings-btn-bg', isDark ? '#2a2d34' : '#fafafa');
        document.documentElement.style.setProperty('--settings-muted', isDark ? '#a9b0bc' : '#666666');
      }

      function setTheme(theme) {
        var targetTheme = theme === 'dark' ? 'dark' : 'light';
        if (window.parent && window.parent.MiOSTheme && typeof window.parent.MiOSTheme.apply === 'function') {
          targetTheme = window.parent.MiOSTheme.apply(targetTheme);
        } else {
          root.classList.toggle('dark-theme', targetTheme === 'dark');
        }
        setSettingsTheme(targetTheme);
        themeSelect.value = targetTheme;
      }

      themeSelect.addEventListener('change', function () {
        setTheme(themeSelect.value);
      });

      toggleMusic.addEventListener('click', function () {
        var audio = window.parent && window.parent.document ? window.parent.document.getElementById('bgMusic') : null;
        if (!audio) {
          musicStatus.textContent = 'Music control is unavailable in this context.';
          return;
        }

        if (audio.paused) {
          audio.play();
          toggleMusic.textContent = 'Pause';
          musicStatus.textContent = 'Background music is currently playing.';
        } else {
          audio.pause();
          toggleMusic.textContent = 'Play';
          musicStatus.textContent = 'Background music is currently paused.';
        }
      });

      var savedTheme = window.parent && window.parent.MiOSTheme && typeof window.parent.MiOSTheme.get === 'function'
        ? window.parent.MiOSTheme.get()
        : themeSelect.value;
      setTheme(savedTheme);
    })();
  </script>
</body>
</html>
